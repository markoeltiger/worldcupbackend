version: '3.8'

services:
  # Main REST API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goaliq_api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - REDIS_URL=redis://cache:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - cache
    restart: always

  # Ingestion Engine Daemon
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goaliq_ingestion
    command: node ingestion/runner.js
    environment:
      - NODE_ENV=development
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - REDIS_URL=redis://cache:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - INGESTION_INTERVAL_SECONDS=30
    depends_on:
      - cache
    restart: always

  # Redis Cache Layer (Used as hot cache)
  cache:
    image: redis:7-alpine
    container_name: goaliq_cache
    ports:
      - "6379:6379"
    restart: always
